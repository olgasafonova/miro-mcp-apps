<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Miro Board Items</title>
  </head>
  <body>
    <main class="app" id="app">
      <section class="header">
        <h1 id="board-name">Loading…</h1>
        <p class="subtitle" id="subtitle"></p>
      </section>

      <section class="filters" id="filters" role="tablist" aria-label="Filter by type"></section>

      <section class="table-wrap">
        <table class="items">
          <thead>
            <tr>
              <th scope="col">Type</th>
              <th scope="col">Label</th>
              <th scope="col">Modified</th>
            </tr>
          </thead>
          <tbody id="items-tbody"></tbody>
        </table>
      </section>

      <div class="actions">
        <span class="count-summary" id="count-summary"></span>
        <button id="open-board-btn" type="button">Open board in Miro</button>
      </div>
    </main>
    <script type="module" src="/src/list-items.ts"></script>
  </body>
</html>
